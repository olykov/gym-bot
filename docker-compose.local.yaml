services:
  gymbot_redis:
    image: redis:7-alpine
    container_name: gymbot_redis
    hostname: gymbot_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - core-infra

  gymbot_db:
    image: postgres:16
    container_name: gymbot_db
    hostname: gymbot_db
    restart: always
    ports:
      - '9981:${DB_PORT}'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - core-infra

  gymbot_backend:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: always
    container_name: gymbot_backend
    hostname: gymbot_backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      WEB_APP_URL: ${WEB_APP_URL}
      REDIS_HOST: gymbot_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BOT_SERVICE_TOKEN: ${BOT_SERVICE_TOKEN}
      API_BASE_URL: ${API_BASE_URL:-http://admin_backend:8000/api/v1}
    volumes:
      - ./apps/bot:/app
    ports:
      - "5400:5400"
    networks:
      - core-infra
    depends_on:
      gymbot_redis:
        condition: service_healthy
      gymbot_db:
        condition: service_started
      admin_backend:
        condition: service_started

  # gymbot_frontend:
  #   build: ./site
  #   restart: always
  #   container_name: gymbot_frontend
  #   hostname: gymbot_frontend
  #   environment:
  #     NEXTAUTH_URL: https://gymbot.olykov.com
  #     NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  #     TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  #     NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
  #     DB_USER: ${DB_USER}
  #     DB_HOST: ${DB_HOST}
  #     DB_NAME: ${DB_NAME}
  #     DB_PASSWORD: ${DB_PASSWORD}
  #     DB_PORT: ${DB_PORT}
  #   expose:
  #     - 3000
  #   networks:
  #     - core-infra
  #   depends_on:
  #     - gymbot_db

  admin_backend:
    build: ./apps/api
    restart: always
    container_name: admin_backend
    hostname: admin_backend
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: gymbot_db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Runtime role: app_rw (NOSUPERUSER NOBYPASSRLS) — RLS applies to this connection.
      # APP_DB_USER defaults to app_rw in config.py; set only to override.
      APP_DB_USER: ${APP_DB_USER:-app_rw}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BOT_SERVICE_TOKEN: ${BOT_SERVICE_TOKEN}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8001:8000"
    networks:
      - core-infra
    depends_on:
      - gymbot_db

  admin_frontend:
    build: ./apps/admin
    restart: always
    container_name: admin_frontend
    hostname: admin_frontend
    ports:
      - "5174:80"
    networks:
      - core-infra
    depends_on:
      - admin_backend

  web_frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    container_name: web_frontend
    hostname: web_frontend
    ports:
      - "5175:80"
    networks:
      - core-infra
    depends_on:
      - admin_backend

volumes:
  redis_data:

networks:
  core-infra:
    external: true
