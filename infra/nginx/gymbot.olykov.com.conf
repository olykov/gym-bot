# Reference copy of the core-infra reverse-proxy vhost for the bot.
#
# This file is NOT deployed by this repo's ansible — the live proxy lives on the
# shared core-infra host at /opt/nginx/conf/conf.d/gymbot.olykov.com.conf and is
# managed there. This copy documents the routing contract and the DNS fix below.
#
# Fix (GYM-18): the original used `proxy_pass http://gymbot_backend:5400;`, which
# nginx resolves ONCE at start/reload and caches. Every deploy recreates the bot
# container with a new IP, so the cached upstream goes stale -> 502 Bad Gateway,
# requiring a manual `nginx -s reload`. Using a `resolver` + a variable upstream
# makes nginx re-resolve via Docker DNS at request time (TTL valid=10s), so future
# deploys self-heal within ~10s and no manual reload is needed.

server {
    listen      80;
    server_name gymbot.olykov.com;
    return      301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    server_name gymbot.olykov.com;

    ssl_certificate           /etc/ssl/private/olykov.com.crt;
    ssl_certificate_key       /etc/ssl/private/olykov.com.key;

    ssl_protocols               TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers                 HIGH:!aNULL:!eNULL:!EXPORT:!CAMELLIA:!DES:!MD5:!PSK:!RC4;
    ssl_prefer_server_ciphers   on;

    access_log                  /var/log/nginx/gymbot.olykov.com.access.log;
    error_log                   /var/log/nginx/gymbot.olykov.com.error.log;

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;   # Docker embedded DNS; re-resolve at runtime
        set $gymbot_upstream gymbot_backend;       # variable forces per-request resolution

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass              http://$gymbot_upstream:5400;
        proxy_read_timeout      90;

        proxy_redirect          http://$gymbot_upstream:5400 https://gymbot.olykov.com;
    }
}
