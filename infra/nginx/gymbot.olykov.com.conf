# Reference copy of the core-infra reverse-proxy vhost for the bot.
#
# NOTE: This file is NOT deployed by this repo's ansible — the live proxy
# lives on the shared core-infra host at
# /opt/nginx/conf/conf.d/gymbot.olykov.com.conf and is managed there.
# The operator must apply changes from this reference manually (or via a
# separate core-infra automation). This copy documents the routing contract.
#
# Routing map (GYM-43):
#   /webhook  → gymbot_backend:5400   (bot; Telegram webhook endpoint)
#   /admin/   → admin_frontend:80     (temporary path; admin panel until relocation task)
#   /         → web_frontend:80       (Telegram Mini App — gymbot.olykov.com root)
#
# DNS fix (GYM-18): using resolver + variable upstream forces nginx to
# re-resolve container names via Docker embedded DNS on every request
# (TTL valid=10s). Without this, nginx caches the IP at startup and goes
# stale (502) after every deploy that recreates a container.

server {
    listen      80;
    server_name gymbot.olykov.com;
    return      301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    server_name gymbot.olykov.com;

    ssl_certificate           /etc/ssl/private/olykov.com.crt;
    ssl_certificate_key       /etc/ssl/private/olykov.com.key;

    ssl_protocols               TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers                 HIGH:!aNULL:!eNULL:!EXPORT:!CAMELLIA:!DES:!MD5:!PSK:!RC4;
    ssl_prefer_server_ciphers   on;

    access_log                  /var/log/nginx/gymbot.olykov.com.access.log;
    error_log                   /var/log/nginx/gymbot.olykov.com.error.log;

    # Bot webhook — must stay at this path; Telegram posts updates here.
    # UNCHANGED from original GYM-18 fix.
    location /webhook {
        resolver 127.0.0.11 valid=10s ipv6=off;   # Docker embedded DNS; re-resolve at runtime
        set $gymbot_upstream gymbot_backend;       # variable forces per-request resolution

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass              http://$gymbot_upstream:5400;
        proxy_read_timeout      90;

        proxy_redirect          http://$gymbot_upstream:5400 https://gymbot.olykov.com;
    }

    # Temporary admin path — admin_frontend reachable at /admin/ until its
    # relocation task. The trailing slash and rewrite strip the /admin prefix
    # before forwarding. NOTE: apps/admin Vite base is "/" so root-relative
    # asset URLs (/assets/...) will be routed to web_frontend instead of here;
    # full SPA functionality requires setting base="/admin/" in apps/admin's
    # Vite config — that is the admin-relocation task's concern, not GYM-43.
    location /admin/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $admin_frontend_upstream admin_frontend;

        rewrite ^/admin/(.*)$ /$1 break;

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass              http://$admin_frontend_upstream:80;
        proxy_read_timeout      90;
    }

    # Mini App — gymbot.olykov.com/ serves apps/web (web_frontend container).
    # All other traffic (including SPA client-side routes) falls through here.
    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $web_frontend_upstream web_frontend;

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass              http://$web_frontend_upstream:80;
        proxy_read_timeout      90;

        proxy_redirect          http://$web_frontend_upstream:80 https://gymbot.olykov.com;
    }
}
