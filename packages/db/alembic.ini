# Alembic configuration for packages/db.
#
# Schema is versioned here. The database URL is NOT stored in this file; env.py
# builds it from the environment (DATABASE_URL, or DB_USER/DB_PASSWORD/DB_HOST/
# DB_PORT/DB_NAME), matching how apps/api reads its settings. Never hardcode
# credentials in version control.
#
# Run from packages/db/:  alembic upgrade head | alembic stamp <rev> | alembic history

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Template used to generate migration file names; %%(rev)s = revision id.
file_template = %%(rev)s_%%(slug)s

# Timezone for create dates in generated migrations (UTC for reproducibility).
timezone = UTC

# sqlalchemy.url is intentionally left blank — env.py sets it from the
# environment. Leaving it empty here prevents accidental credential leakage.
sqlalchemy.url =


[post_write_hooks]
# No automatic formatting hooks; ruff is run manually per project standards.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
