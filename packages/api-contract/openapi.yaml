openapi: 3.1.0
info:
  title: Gym Tracker Core API
  version: 0.1.0
  description: >
    Single source-of-truth contract between the Core API (apps/api) and every client
    (bot, admin, web, miniapp, future mobile). Covers every data operation the bot
    performs today (so Phase 3 can move the bot off direct SQL) plus the admin operations.


    Authentication: a per-user session JWT issued by the auth endpoints, sent as
    `Authorization: Bearer <token>` (`userJwt`). Per-user scoping is derived from the
    authenticated identity (`sub` claim) — clients never pass `user_id` in the body or query.
    Bot-facing operations also accept a service token (`serviceAuth`, the `X-Service-Token`
    header) together with `X-Act-As-User` (the Telegram id the service acts on behalf of).
servers:
  - url: /api/v1
    description: Core API v1

tags:
  - name: auth
    description: Session issuance for bot, web/miniapp and admin clients.
  - name: users
    description: User registration and lookup (maps to bot get_user / registration).
  - name: muscles
    description: Muscle groups visible to the authenticated user (global minus hidden, plus private).
  - name: exercises
    description: Exercises for a muscle, with hide (global) and delete (private) semantics.
  - name: training
    description: Training set records (create / update / list).
  - name: analytics
    description: Read-only training analytics derived from the user's history.
  - name: admin
    description: Global catalog management for muscles and exercises (admin clients).

paths:
  # ---------------------------------------------------------------- auth
  /auth/telegram/webapp:
    post:
      tags: [auth]
      summary: Authenticate using Telegram Web App initData
      operationId: authTelegramWebApp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramWebAppAuthRequest'
      responses:
        '200':
          description: Session token and user payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/telegram:
    post:
      tags: [auth]
      summary: Authenticate using the Telegram Login Widget
      operationId: authTelegramWidget
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramLoginRequest'
      responses:
        '200':
          description: Session token and user payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/admin:
    post:
      tags: [auth]
      summary: Authenticate using admin username and password
      operationId: authAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAuthRequest'
      responses:
        '200':
          description: Session token and user payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [auth]
      summary: Resolve the current identity from the session token
      operationId: getCurrentIdentity
      responses:
        '200':
          description: The session claims for the authenticated caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionIdentity'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------- users
  /users/me:
    get:
      tags: [users]
      summary: Get the authenticated user's profile
      description: >
        Maps to the bot's `get_user(user_id)`. Returns 404 when the caller has an
        authenticated identity but no stored user row yet (i.e. not registered).
      operationId: getMe
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: The user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [users]
      summary: Register or upsert the authenticated user's profile
      description: >
        Maps to the bot's registration path (`save_any_data("users", {...})`).
        The user id is taken from the authenticated identity, never the body.
        Idempotent: creating an already-registered user updates the profile.
      operationId: upsertMe
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        '200':
          description: The registered/updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------- muscles
  /muscles:
    get:
      tags: [muscles]
      summary: List muscle groups visible to the authenticated user
      description: >
        Maps to `get_all_muscles(user_id)`: global muscles not hidden by the user,
        plus the user's private muscles, ordered by name.
      operationId: listMuscles
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Visible muscle groups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Muscle'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [muscles]
      summary: Add a muscle group for the authenticated user
      description: >
        Maps to `add_muscle(name, user_id)`. Find-or-create-or-unhide: the name is
        normalized to its key, then matched against the caller's scope. If a row with
        that key already exists in scope: if it is hidden, it is silently unhidden and
        returned (`resolution = unhidden`, HTTP 200); if it is already visible, the
        existing row is returned with no duplicate created (`resolution = existing`,
        HTTP 200). Otherwise a new private muscle owned by the caller is created
        (`resolution = created`, HTTP 201). The request body is unchanged.
      operationId: createMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuscleCreate'
      responses:
        '200':
          description: >
            An existing muscle was resolved (no new row): `resolution = unhidden`
            when a hidden item was silently unhidden, or `resolution = existing`
            when the visible item already existed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Muscle'
        '201':
          description: A new muscle was created (`resolution = created`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Muscle'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /muscles/hidden:
    get:
      tags: [muscles]
      summary: List muscle groups the authenticated user has hidden
      description: >
        The global muscles the caller has hidden (via `PUT /muscles/{muscle_id}/hidden`).
        Powers the "Show Hidden → Unhide" affordance. Empty array when nothing is hidden.
      operationId: listHiddenMuscles
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Muscle groups hidden by the caller.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Muscle'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /muscles/{muscle_id}/hidden:
    put:
      tags: [muscles]
      summary: Hide a global muscle for the authenticated user
      description: >
        Reserved for parity with exercise hiding. The bot does not yet expose a
        hide-muscle operation; see README "Coverage gaps". Additive and safe.
      operationId: hideMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Muscle hidden for the caller.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [muscles]
      summary: Unhide a previously hidden global muscle
      operationId: unhideMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Muscle visible again for the caller.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /muscles/{muscle_id}:
    patch:
      tags: [muscles]
      summary: Rename a private muscle owned by the authenticated user
      description: >
        Renames the caller's own private muscle. Only a muscle the caller owns
        (`is_mine == true`) can be renamed; global catalog muscles are read-only
        and return 403. A name already used by another of the caller's muscles
        returns 409. The new name is validated like creation (see MuscleCreate).
      operationId: renameMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleId'
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuscleRename'
      responses:
        '200':
          description: The renamed muscle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Muscle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [muscles]
      summary: Delete a private muscle owned by the authenticated user
      description: >
        Parity with private-exercise deletion. Only the caller's own private muscle
        can be removed. See README "Coverage gaps".
      operationId: deletePrivateMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Private muscle deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------- exercises
  /muscles/{muscle_id}/exercises:
    get:
      tags: [exercises]
      summary: List exercises for a muscle, visible to the authenticated user
      description: >
        Maps to `get_exercises_by_muscle(muscle, user_id)`: global exercises not
        hidden by the user plus the user's private exercises for that muscle.
      operationId: listExercisesByMuscle
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Visible exercises for the muscle.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /exercises:
    post:
      tags: [exercises]
      summary: Add an exercise for the authenticated user
      description: >
        Maps to `add_exercise(name, muscle_name, user_id)`. Find-or-create-or-unhide:
        the name is normalized to its key, then matched against the caller's scope
        under the given muscle (the muscle is created if needed). If a row with that
        key already exists in scope: if it is hidden, it is silently unhidden and
        returned (`resolution = unhidden`, HTTP 200); if it is already visible, the
        existing row is returned with no duplicate created (`resolution = existing`,
        HTTP 200). Otherwise a new private exercise owned by the caller is created
        (`resolution = created`, HTTP 201). The request body is unchanged.
      operationId: createExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseCreate'
      responses:
        '200':
          description: >
            An existing exercise was resolved (no new row): `resolution = unhidden`
            when a hidden item was silently unhidden, or `resolution = existing`
            when the visible item already existed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '201':
          description: A new exercise was created (`resolution = created`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exercises/search:
    get:
      tags: [exercises]
      summary: Search canonical exercise candidates by name and aliases
      description: >
        Ranked candidate search over canonical exercise names and their aliases
        (`exercise_alias`, Channel B of ADR 0003), for the add-exercise
        search-and-pick dropdown (GYM-94). Matches `q` and ranks candidates by:
        exact `name_key` -> prefix on `name_key` -> alias hit (lang-aware on
        `exercise_alias.lang`) -> `pg_trgm` fuzzy (typos). Scoped to a single
        muscle when `muscle_id` is given, otherwise the whole catalog. Works with
        zero aliases (over the canonical English names via `name_key`); aliases
        only enrich the ranking. `lang` is the caller's resolved locale (GYM-108,
        Telegram `language_code`). No embeddings here (that is GYM-96).
      operationId: searchExercises
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: The search query (the user's typed text).
          schema:
            type: string
            minLength: 1
        - name: muscle_id
          in: query
          required: false
          description: >
            Scope candidates to this muscle. When omitted, the whole catalog is searched.
          schema:
            type: integer
        - name: lang
          in: query
          required: false
          description: >
            ISO-639-1 locale (e.g. `ru`) for lang-aware alias matching, resolved by
            the client from the Telegram language_code (GYM-108). When omitted, only
            the canonical `name_key` is matched.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of candidates to return.
          schema:
            type: integer
            default: 8
            maximum: 20
            minimum: 1
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Ranked candidate exercises, best match first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseCandidate'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exercises/hidden:
    get:
      tags: [exercises]
      summary: List exercises the authenticated user has hidden within a muscle
      description: >
        The global exercises the caller has hidden (via `PUT /exercises/{exercise_id}/hidden`)
        for the given muscle. Powers the "Show Hidden → Unhide" affordance. Empty array when
        nothing is hidden for that muscle.
      operationId: listHiddenExercises
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Exercises hidden by the caller within the muscle.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exercises/{exercise_id}/hidden:
    put:
      tags: [exercises]
      summary: Hide a global exercise for the authenticated user
      description: Maps to `hide_exercise(user_id, exercise_name, muscle_name)`.
      operationId: hideExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ExerciseId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Exercise hidden for the caller.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [exercises]
      summary: Unhide a previously hidden global exercise
      operationId: unhideExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ExerciseId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Exercise visible again for the caller.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /exercises/{exercise_id}:
    patch:
      tags: [exercises]
      summary: Rename a private exercise owned by the authenticated user
      description: >
        Renames the caller's own private exercise. Only an exercise the caller
        owns (`is_mine == true`) can be renamed; global catalog exercises are
        read-only and return 403. A name already used by another of the caller's
        exercises under the same muscle returns 409. The new name is validated
        like creation (see ExerciseCreate).
      operationId: renameExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ExerciseId'
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseRename'
      responses:
        '200':
          description: The renamed exercise.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [exercises]
      summary: Delete a private exercise owned by the authenticated user
      description: Maps to `delete_private_exercise(user_id, exercise_name, muscle_name)`.
      operationId: deletePrivateExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ExerciseId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Private exercise deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /exercises/{exercise_id}/muscle:
    patch:
      tags: [exercises]
      summary: Move a private exercise owned by the authenticated user to another muscle
      description: >
        Reassigns the caller's own private exercise to a different muscle (e.g. an
        exercise misfiled under one muscle is moved to the correct one). Only an
        exercise the caller owns (`is_mine == true`) can be moved; global catalog
        exercises are read-only here and return 403 — moving a canonical placement
        is a separate future decision (GYM-91). The target muscle must exist and be
        visible to the caller; a missing exercise or target muscle returns 404. When
        the caller already has an exercise with the same name under the target muscle
        (unique `(name, muscle, created_by)` collision) the move returns 409.
      operationId: moveExercise
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ExerciseId'
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseMove'
      responses:
        '200':
          description: The moved exercise.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------- training
  /training:
    get:
      tags: [training]
      summary: List the authenticated user's training records
      description: Maps to the existing user training listing, newest first.
      operationId: listTraining
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/Skip'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Training records for the caller.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Training'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [training]
      summary: Record a training set for the authenticated user
      description: >
        Maps to `save_training_data(...)`. The server assigns `id` and `date` and
        derives `user_id` from the identity; the client sends the muscle, exercise,
        set, weight and reps.
      operationId: createTraining
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingCreate'
      responses:
        '201':
          description: The created training record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /training/days:
    get:
      tags: [training]
      summary: List the caller's training days, grouped and reverse-chronological
      description: >
        Day-grouped view of the caller's training history for the History feature:
        one entry per day the caller trained, newest day first. The optional `from`
        and `to` query params bound the window (inclusive, date part only);
        omitting them returns a default window. Dates are naive-tolerant (GYM-30).
      operationId: listTrainingDays
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
        - name: from
          in: query
          required: false
          description: Inclusive start date of the window (date part only).
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Inclusive end date of the window (date part only).
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          description: Training days for the caller, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingDay'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /training/day/{date}:
    get:
      tags: [training]
      summary: Detail of the caller's training on a single day
      description: >
        All sets the caller recorded on the given day, grouped by exercise with
        muscle and exercise names denormalized so the client does not have to join.
        The date is naive-tolerant (GYM-30).
      operationId: getTrainingDay
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - name: date
          in: path
          required: true
          description: Calendar date of the training day (date part only).
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: The caller's training detail for the day.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingDayDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /training/{training_id}:
    put:
      tags: [training]
      summary: Update weight and reps of an existing training record
      description: >
        Maps to `update_training_data(training_id, user_id, weight, reps)`. Only the
        caller's own record can be updated; only weight and reps are mutable.
      operationId: updateTraining
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/TrainingId'
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingUpdate'
      responses:
        '200':
          description: The updated training record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [training]
      summary: Delete a training set owned by the authenticated user
      description: >
        Deletes the caller's own recorded set. Only the caller's own record can be
        removed (RLS-scoped per identity / X-Act-As-User).
      operationId: deleteTraining
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/TrainingId'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '204':
          description: Training set deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /training/{training_id}/move:
    patch:
      tags: [training]
      summary: Move a training set to another day and/or exercise
      description: >
        Moves the caller's own set to another calendar day (date) and/or another
        exercise (muscle_name + exercise_name). Only the caller's own record can be
        moved (RLS-scoped per identity / X-Act-As-User). At least one of
        {date, (muscle_name + exercise_name)} must be provided; the set's number,
        weight and reps are preserved. History v2 (GYM-51).
      operationId: moveTrainingSet
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/TrainingId'
        - $ref: '#/components/parameters/ActAsUser'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingMove'
      responses:
        '200':
          description: The moved training record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Training set not found or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: >
            The target day + exercise already has a set with the same set number
            (collision).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >
            Invalid body, nothing to move (no date and no muscle_name+exercise_name),
            or the target exercise does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ---------------------------------------------------------------- analytics
  /analytics/completed-sets:
    get:
      tags: [analytics]
      summary: Set numbers already recorded for an exercise on a given date
      description: Maps to `get_completed_sets(user, muscle, exercise, date)`.
      operationId: getCompletedSets
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
        - name: date
          in: query
          required: true
          description: Calendar date to filter by (date part only).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Distinct completed set numbers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletedSets'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/log-context:
    get:
      tags: [analytics]
      summary: Combined set-logger context for an exercise on a date
      description: >
        One read powering the record set-logger: the set numbers already logged on
        `date` for this exercise, the most recent PRIOR session's sets (for per-set
        pre-fill), and the personal record. Replaces firing completed-sets +
        personal-record + a last-session lookup separately. Dates are
        naive-tolerant (GYM-30).
      operationId: getLogContext
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
        - name: date
          in: query
          required: true
          description: Calendar date the log session is on (date part only).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The combined log context for the exercise on the date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogContext'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/history:
    get:
      tags: [analytics]
      summary: Previous training history for an exercise (excludes today)
      description: Maps to `get_last_training_history(user, muscle, exercise)`.
      operationId: getTrainingHistory
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: History entries, newest date first then set ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingHistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/personal-record:
    get:
      tags: [analytics]
      summary: Personal record (max weight) for an exercise
      description: Maps to `get_personal_record(user, muscle, exercise)`.
      operationId: getPersonalRecord
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: The personal record, or null when no history exists.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonalRecord'
                  - type: 'null'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/max-reps:
    get:
      tags: [analytics]
      summary: Maximum reps ever performed at a given weight for an exercise
      description: Maps to `get_max_reps_for_weight(user, muscle, exercise, weight)`.
      operationId: getMaxRepsForWeight
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
        - name: weight
          in: query
          required: true
          description: Weight value to filter by.
          schema:
            type: number
      responses:
        '200':
          description: Maximum reps at the weight, or null when no history exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxReps'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/top-exercises:
    get:
      tags: [analytics]
      summary: Most frequently used exercises for a muscle
      description: Maps to `get_top_exercises_for_muscle(user, muscle, limit)`.
      operationId: getTopExercises
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
        - name: limit
          in: query
          required: false
          description: Maximum number of exercises to return.
          schema:
            type: integer
            default: 5
            minimum: 1
      responses:
        '200':
          description: Exercises ranked by training frequency.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopExercise'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/recent-exercises:
    get:
      tags: [analytics]
      summary: The caller's most-recently-trained distinct exercises
      description: >
        The caller's most-recently-trained distinct exercises, newest first, each
        carrying the last working set's weight/reps and the date it was recorded.
        Powers the record flow's fast lane and the cold-open pre-fill (spec §12.9)
        in a single read. Dates are naive-tolerant (GYM-30).
      operationId: getRecentExercises
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
        - name: limit
          in: query
          required: false
          description: Maximum number of exercises to return.
          schema:
            type: integer
            default: 8
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Distinct exercises ordered by most recently trained, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecentExercise'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/top-muscles:
    get:
      tags: [analytics]
      summary: Muscles ranked by the caller's training frequency
      description: >
        Muscles the caller has trained, ordered by descending session count.
        Feeds the Progress muscle picker so the most-trained muscles surface first.
      operationId: getTopMuscles
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Muscles ranked by training frequency.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopMuscle'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/activity:
    get:
      tags: [analytics]
      summary: Daily activity counts for a date range (contribution grid)
      description: >
        One entry per day that has activity within the range, with the number of
        sets recorded that day. Scoped to the caller. Feeds the Mini App activity grid.
      operationId: getActivity
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
        - name: from
          in: query
          required: true
          description: Inclusive start date of the range (date part only).
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          description: Inclusive end date of the range (date part only).
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          description: Activity counts, one entry per active day in the range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityDay'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/summary:
    get:
      tags: [analytics]
      summary: Dashboard summary numbers for the caller
      description: >
        The four headline metrics for the Mini App dashboard: distinct exercises ever
        logged, total sets, count of personal records, and the current consecutive-day
        streak. Scoped to the caller.
      operationId: getAnalyticsSummary
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          description: The dashboard summary numbers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/exercise-progress:
    get:
      tags: [analytics]
      summary: Weight/reps progress series for an exercise, grouped by set
      description: >
        Per-set time series of weight and reps for a single exercise, shaped for
        ECharts (one series per set number). Scoped to the caller.
      operationId: getExerciseProgress
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
      responses:
        '200':
          description: Per-set progress series for the exercise.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/exercise-trend:
    get:
      tags: [analytics]
      summary: Session volume delta + e1RM trend series for an exercise
      description: >
        One small read powering the SetLogger sparkline and the session-vs-session
        volume delta (GYM-134): the most recent session's volume, the previous
        session's volume, and a per-session max-e1RM series over the trailing
        `weeks` window. Volume is the sum of weight×reps across the session's
        (calendar day's) sets; e1RM uses Epley, weight × (1 + reps/30).
        Scoped to the caller.
      operationId: getExerciseTrend
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/MuscleNameQuery'
        - $ref: '#/components/parameters/ExerciseNameQuery'
        - $ref: '#/components/parameters/ActAsUser'
        - name: weeks
          in: query
          required: false
          description: Trailing window for the e1RM trend, in weeks.
          schema:
            type: integer
            default: 8
            minimum: 1
            maximum: 52
      responses:
        '200':
          description: The exercise trend payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseTrend'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/week-compare:
    get:
      tags: [analytics]
      summary: This-week vs last-week sets/volume totals for the Dashboard
      description: >
        Training totals for the current calendar week and the previous one
        (GYM-136): sets = number of recorded sets, volume = sum of weight×reps.
        Weeks are Monday-start calendar weeks computed in the `tz` timezone
        (UTC when omitted); `this_week` is the week containing today,
        `last_week` is the week immediately before. A week with no training
        carries zeros. Scoped to the caller.
      operationId: getWeekCompare
      security:
        - userJwt: []
        - serviceAuth: []
      parameters:
        - $ref: '#/components/parameters/ActAsUser'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          description: The week comparison totals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekCompare'
        '401':
          $ref: '#/components/responses/Unauthorized'

