          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticData'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    userJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Per-user session JWT issued by the /auth endpoints, sent as
        `Authorization: Bearer <token>`. Per-user scoping is derived from the
        `sub` claim. Used by web/miniapp/admin and accepted by the bot-facing
        operations.
    serviceAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: >
        Service-to-service token identifying a trusted backend (the bot). Sent
        as the `X-Service-Token` header. A service request MUST also carry the
        companion header `X-Act-As-User` (modeled as the `ActAsUser` parameter
        on each bot-facing operation): the integer Telegram id the service acts
        on behalf of, used for per-user scoping in place of a JWT `sub` claim.

  parameters:
    ActAsUser:
      name: X-Act-As-User
      in: header
      required: false
      description: >
        Telegram id the service acts on behalf of. REQUIRED when authenticating
        with `serviceAuth` (the X-Service-Token header); ignored when
        authenticating with a per-user JWT (scoping comes from the `sub` claim).
      schema:
        type: integer
        format: int64
    MuscleId:
      name: muscle_id
      in: path
      required: true
      schema:
        type: integer
    ExerciseId:
      name: exercise_id
      in: path
      required: true
      schema:
        type: integer
    TrainingId:
      name: training_id
      in: path
      required: true
      schema:
        type: string
    MuscleNameQuery:
      name: muscle
      in: query
      required: true
      description: Muscle group name.
      schema:
        type: string
    ExerciseNameQuery:
      name: exercise
      in: query
      required: true
      description: Exercise name.
      schema:
        type: string
    TimezoneQuery:
      name: tz
      in: query
      required: false
      description: >
        Optional IANA timezone name (e.g. "Asia/Tbilisi", "Europe/Berlin") used to
        compute day/week boundaries for grouping. When provided, days and weeks are
        grouped in this timezone; when omitted, boundaries are computed in UTC
        (unchanged, backward-compatible behavior). Only meaningful on endpoints that
        group results by day or week.
      schema:
        type: string
        example: Asia/Tbilisi
    Skip:
      name: skip
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid session token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found or not accessible to the caller.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >
        The caller is authenticated but not allowed to perform this operation
        (e.g. renaming a global catalog item the caller does not own).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: >
        The request conflicts with existing state (e.g. the new name is already
        used by another of the caller's records).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Request body failed validation (e.g. invalid name).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

    # ---- auth
    TelegramWebAppAuthRequest:
      type: object
      required: [initData]
      properties:
        initData:
          type: string
          description: Raw Telegram Web App initData query string.

    TelegramLoginRequest:
      type: object
      required: [id, first_name, auth_date, hash]
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        photo_url:
          type: string
        auth_date:
          type: integer
        hash:
          type: string

    AdminAuthRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/SessionIdentity'

    SessionIdentity:
      type: object
      description: Claims carried in the session token.
      required: [sub]
      properties:
        sub:
          type: string
          description: Subject — the user id (Telegram id) or admin username.
        role:
          type: string
          enum: [user, admin]
      additionalProperties: true

    # ---- users
    User:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
          description: Telegram user id.
        first_name:
          type: ['string', 'null']
        lastname:
          type: ['string', 'null']
        username:
          type: ['string', 'null']
        bio:
          type: ['string', 'null']
        registration_date:
          type: ['string', 'null']
          format: date-time
        last_interaction:
          type: ['string', 'null']
          format: date-time

    UserRegistration:
      type: object
      description: Profile fields supplied at registration; id comes from the identity.
      properties:
        first_name:
          type: ['string', 'null']
        lastname:
          type: ['string', 'null']
        username:
          type: ['string', 'null']
        bio:
          type: ['string', 'null']

    # ---- muscles
    Muscle:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        is_global:
          type: boolean
          description: True for the shared catalog; false for a user's private muscle.
        created_by:
          type: ['integer', 'null']
          format: int64
          description: Owning user id for a private muscle; null for global.
        is_mine:
          type: boolean
          description: >
            True when this is the caller's own custom record (rename/delete
            allowed); false for global catalog items (hide only).
        resolution:
          type: ['string', 'null']
          enum: [created, unhidden, existing]
          description: >
            Only set on create responses: 'created' = a new row; 'unhidden' = an
            existing hidden item was silently unhidden; 'existing' = the item
            already existed and visible (no duplicate created). Absent/null on
            list and read responses.

    MuscleCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 30
          pattern: "^[A-Za-z0-9À-ÖØ-öø-ÿА-яЁё \\-'.,()/&+°]+$"
          description: >
            Muscle group name. Normalized (trim + collapse internal whitespace) then validated.
            Allowed: Unicode letters/digits, space, and - ' . , ( ) / & + ° (degree).
            See docs/validation.md (Name rules).

    MuscleRename:
      type: object
      description: New name for an existing private muscle. Same rules as MuscleCreate.name.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 30
          pattern: "^[A-Za-z0-9À-ÖØ-öø-ÿА-яЁё \\-'.,()/&+°]+$"
          description: >
            New muscle group name. Normalized (trim + collapse internal whitespace) then validated.
            Allowed: Unicode letters/digits, space, and - ' . , ( ) / & + ° (degree).
            See docs/validation.md (Name rules).

    # ---- exercises
    Exercise:
      type: object
      required: [id, name, muscle]
      properties:
        id:
          type: integer
        name:
          type: string
        muscle:
          type: integer
          description: Owning muscle id.
        is_global:
          type: boolean
        created_by:
          type: ['integer', 'null']
          format: int64
        is_mine:
          type: boolean
          description: >
            True when this is the caller's own custom record (rename/delete
            allowed); false for global catalog items (hide only).
        resolution:
          type: ['string', 'null']
          enum: [created, unhidden, existing]
          description: >
            Only set on create responses: 'created' = a new row; 'unhidden' = an
            existing hidden item was silently unhidden; 'existing' = the item
            already existed and visible (no duplicate created). Absent/null on
            list and read responses.

    ExerciseCandidate:
      type: object
      description: >
        A ranked canonical exercise candidate returned by `GET /exercises/search`.
        Identity and name fields mirror the `Exercise` schema (`id`, `name`,
        `muscle`); `muscle_name` denormalizes the owning muscle so the dropdown
        does not have to join. `match_reason` and `score` describe why and how
        strongly the candidate matched (higher `score` = better).
      required: [id, name, muscle, muscle_name, match_reason, score]
      properties:
        id:
          type: integer
          description: Canonical exercise id (mirrors Exercise.id).
        name:
          type: string
          description: Display name of the exercise (mirrors Exercise.name).
        muscle:
          type: integer
          description: Owning muscle id (mirrors Exercise.muscle).
        muscle_name:
          type: string
          description: Owning muscle name, denormalized for display.
        match_reason:
          type: string
          enum: [exact, prefix, alias, fuzzy]
          description: >
            Why the candidate matched: 'exact' = exact name_key, 'prefix' =
            name_key prefix, 'alias' = matched a (lang-aware) exercise_alias,
            'fuzzy' = pg_trgm similarity (typo tolerance).
        score:
          type: number
          description: Ranking score; higher is a better match.

    ExerciseCreate:
      type: object
      description: Create a private exercise under a muscle (referenced by name, matching the bot).
      required: [name, muscle_name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
          pattern: "^[A-Za-z0-9À-ÖØ-öø-ÿА-яЁё \\-'.,()/&+°]+$"
          description: >
            Exercise name. Normalized (trim + collapse internal whitespace) then validated.
            Allowed: Unicode letters/digits, space, and - ' . , ( ) / & + ° (degree).
            See docs/validation.md (Name rules).
        muscle_name:
          type: string
          minLength: 1
          description: >
            Owning muscle group name — reference to an existing record, normalized only
            (trim + collapse internal whitespace), not length/char-bound. Must match an
            existing muscle; non-matching values 404 at the DB. See docs/validation.md
            (Name rules — Create vs lookup).

    ExerciseRename:
      type: object
      description: New name for an existing private exercise. Same rules as ExerciseCreate.name.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
          pattern: "^[A-Za-z0-9À-ÖØ-öø-ÿА-яЁё \\-'.,()/&+°]+$"
          description: >
            New exercise name. Normalized (trim + collapse internal whitespace) then validated.
            Allowed: Unicode letters/digits, space, and - ' . , ( ) / & + ° (degree).
            See docs/validation.md (Name rules).

    ExerciseMove:
      type: object
      description: >
        Target muscle for moving the caller's own private exercise. References an
        existing muscle visible to the caller by id; a non-matching id returns 404.
      required: [muscle_id]
      properties:
        muscle_id:
          type: integer
          description: Id of the muscle to move the exercise under.

    AdminExerciseCreate:
      type: object
      description: Create/update a global exercise referencing the muscle by id.
      required: [name, muscle]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
          pattern: "^[A-Za-z0-9À-ÖØ-öø-ÿА-яЁё \\-'.,()/&+°]+$"
          description: >
            Exercise name. Normalized (trim + collapse internal whitespace) then validated.
            Allowed: Unicode letters/digits, space, and - ' . , ( ) / & + ° (degree).
            See docs/validation.md (Name rules).
        muscle:
          type: integer

    # ---- training
    Training:
      type: object
      required: [id, date, user_id, muscle_id, exercise_id, set, weight, reps]
      properties:
        id:
          type: string
          description: Server-assigned record id.
        date:
          type: string
          format: date-time
        user_id:
          type: integer
          format: int64
        muscle_id:
          type: integer
        exercise_id:
          type: integer
        set:
          type: integer
        weight:
          type: number
        reps:
          type: number

    TrainingCreate:
      type: object
      description: >
        Record a set. Muscle and exercise are referenced by name (matching the bot's
        save_training_data); id, date and user_id are assigned by the server.
      required: [muscle_name, exercise_name, set, weight, reps]
      properties:
        muscle_name:
          type: string
          minLength: 1
          description: >
            Muscle group name — reference to an existing record, normalized only
            (trim + collapse internal whitespace), not length/char-bound.
            See docs/validation.md (Name rules — Create vs lookup).
        exercise_name:
          type: string
          minLength: 1
          description: >
            Exercise name — reference to an existing record, normalized only
            (trim + collapse internal whitespace), not length/char-bound.
            See docs/validation.md (Name rules — Create vs lookup).
        set:
          type: integer
        weight:
          type: number
        reps:
          type: number
        date:
          type: string
          format: date
          description: >
            Optional calendar day to log the set on (date part only; naive-tolerant
            per GYM-30). When provided, the set is recorded on that day (retroactive
            add). When omitted, the server uses now() — unchanged, backward-compatible.

    TrainingUpdate:
      type: object
      required: [weight, reps]
      properties:
        weight:
          type: number
        reps:
          type: number

    TrainingMove:
      type: object
      description: >
        Move an existing set to another calendar day and/or another exercise.
        All fields are OPTIONAL, but at least one of {date, (muscle_name +
        exercise_name)} must be provided — a body that moves nothing is rejected
        (422). To move to another exercise, send BOTH muscle_name and exercise_name.
        Validation (at-least-one, both names together, target exercise exists) is
        enforced in the API.
      properties:
        date:
          type: string
          format: date
          description: >
            Target calendar day to move the set to (date part only; naive-tolerant
            per GYM-30). Omit to keep the set on its current day.
        muscle_name:
          type: string
          description: >
            Target muscle group name — reference to an existing record, normalized
            only (trim + collapse internal whitespace), not length/char-bound.
            Required together with exercise_name when moving to another exercise.
            See docs/validation.md (Name rules — Create vs lookup).
        exercise_name:
          type: string
          description: >
            Target exercise name — reference to an existing record, normalized only
            (trim + collapse internal whitespace), not length/char-bound. Required
            together with muscle_name when moving to another exercise.
            See docs/validation.md (Name rules — Create vs lookup).

    TrainingDay:
      type: object
      description: One day the caller trained, summarised for the History list.
      required: [date, muscles, exercises_count, sets_count, has_pr]
      properties:
        date:
          type: string
          format: date
        muscles:
          type: array
          items:
            type: string
          description: Names of the muscle groups trained that day.
        exercises_count:
          type: integer
          description: Distinct exercises trained that day.
        sets_count:
          type: integer
          description: Total sets recorded that day.
        has_pr:
          type: boolean
          description: >
            True when the day holds the caller's current all-time max-weight set
            of at least one exercise (GYM-136). Semantic is "current max", not
            "was a PR when logged": the marker reflects today's standing weight
            records, so a later heavier set moves the marker to its own day, and
            a tie marks every tying day.

    TrainingSet:
      type: object
      description: A single recorded set within a training day's exercise.
      required: [training_id, set, weight, reps]
      properties:
        training_id:
          type: string
          description: Server-assigned record id of the set.
        set:
          type: integer
        weight:
          type: number
        reps:
          type: number

    TrainingDayExercise:
      type: object
      description: One exercise trained on a day, with denormalized names and its sets.
      required: [exercise_id, exercise_name, muscle_name, sets]
      properties:
        exercise_id:
          type: integer
        exercise_name:
          type: string
        muscle_name:
          type: string
        sets:
          type: array
          items:
            $ref: '#/components/schemas/TrainingSet'

    TrainingDayDetail:
      type: object
      description: Full detail of the caller's training on a single day.
      required: [date, exercises]
      properties:
        date:
          type: string
          format: date
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/TrainingDayExercise'

    # ---- analytics
    CompletedSets:
      type: object
      required: [sets]
      properties:
        sets:
          type: array
          items:
            type: integer
          description: Distinct set numbers already recorded for the exercise on the date.

    TrainingHistoryEntry:
      type: object
      required: [date, set, weight, reps]
      properties:
        date:
          type: string
          format: date-time
        set:
          type: integer
        weight:
          type: number
        reps:
          type: number

    PersonalRecord:
      type: object
      required: [weight, reps, date]
      properties:
        weight:
          type: number
        reps:
          type: number
        date:
          type: string
          format: date-time

    LogSet:
      type: object
      description: A single set from a session, for set-logger pre-fill.
      required: [set, weight, reps]
      properties:
        set:
          type: integer
        weight:
          type: number
        reps:
          type: number

    LogContext:
      type: object
      description: >
        Combined set-logger context: sets already logged on the date, the most
        recent prior session's sets, and the personal record. Dates are
        naive-tolerant (GYM-30).
      required: [completed_sets, last_session_sets, pr]
      properties:
        completed_sets:
          type: array
          items:
            type: integer
          description: Set numbers already logged on the date for this exercise.
        last_session_sets:
          type: array
          items:
            $ref: '#/components/schemas/LogSet'
          description: The most recent prior session's sets, ordered by set.
        pr:
          oneOf:
            - $ref: '#/components/schemas/PersonalRecord'
            - type: 'null'
          description: The personal record, or null when no history exists.

    MaxReps:
      type: object
      required: [max_reps]
      properties:
        max_reps:
          type: ['number', 'null']
          description: Maximum reps at the queried weight, or null when no history exists.

    TopExercise:
      type: object
      required: [name, frequency]
      properties:
        name:
          type: string
        frequency:
          type: integer
          description: Number of recorded sessions for the exercise.

    RecentExercise:
      type: object
      description: >
        A distinct exercise the caller has trained, carrying the last working
        set's weight/reps and the date it was recorded. Dates are naive-tolerant (GYM-30).
      required: [muscle_name, exercise_name, last_weight, last_reps, last_date]
      properties:
        muscle_name:
          type: string
        exercise_name:
          type: string
        last_weight:
          type: number
        last_reps:
          type: number
        last_date:
          type: string
          format: date

    TopMuscle:
      type: object
      required: [name, frequency]
      properties:
        name:
          type: string
        frequency:
          type: integer
          description: Number of recorded sessions for the muscle.

    ActivityDay:
      type: object
      description: Sets recorded on a single day within the requested range.
      required: [date, sets_count]
      properties:
        date:
          type: string
          format: date
        sets_count:
          type: integer
          description: Number of sets recorded on this day.

    AnalyticsSummary:
      type: object
      description: Headline dashboard metrics for the caller.
      required: [exercises, sets, prs, current_streak]
      properties:
        exercises:
          type: integer
          description: Distinct exercises ever logged.
        sets:
          type: integer
          description: Total sets recorded.
        prs:
          type: integer
          description: Count of personal records.
        current_streak:
          type: integer
          description: Current consecutive-day training streak.

    ExercisePoint:
      type: object
      description: A single recorded point of weight and reps on a date.
      required: [date, weight, reps]
      properties:
        date:
          type: string
          format: date
        weight:
          type: number
        reps:
          type: number

    ExerciseSetSeries:
      type: object
      description: Progress series for one set number.
      required: [set, points]
      properties:
        set:
          type: integer
        points:
          type: array
          items:
            $ref: '#/components/schemas/ExercisePoint'

    ExerciseProgress:
      type: object
      description: Per-set progress series for an exercise, shaped for ECharts.
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseSetSeries'

    SessionVolume:
      type: object
      description: One training session (calendar day) with its total volume.
      required: [date, volume]
      properties:
        date:
          type: string
          format: date
        volume:
          type: number
          description: Sum of weight×reps across all sets of the session.

    E1rmPoint:
      type: object
      description: Per-session maximum estimated one-rep max (Epley).
      required: [date, e1rm]
      properties:
        date:
          type: string
          format: date
        e1rm:
          type: number
          description: max(weight × (1 + reps/30)) across the session's sets.

    ExerciseTrend:
      type: object
      description: >
        Session-vs-session volume delta inputs plus a per-session max-e1RM
        trend over the trailing window (GYM-134).
      required: [last_session, prev_session, e1rm_trend]
      properties:
        last_session:
          oneOf:
            - $ref: '#/components/schemas/SessionVolume'
            - type: 'null'
          description: The most recent session, or null when no history exists.
        prev_session:
          oneOf:
            - $ref: '#/components/schemas/SessionVolume'
            - type: 'null'
          description: The session before the most recent one, or null.
        e1rm_trend:
          type: array
          items:
            $ref: '#/components/schemas/E1rmPoint'
          description: Per-session max-e1RM points within the window, date ascending.

    WeekStats:
      type: object
      description: Training totals for one Monday-start calendar week (GYM-136).
      required: [sets, volume]
      properties:
        sets:
          type: integer
          description: Number of sets recorded in the week.
        volume:
          type: number
          description: Sum of weight×reps across the week's sets.

    WeekCompare:
      type: object
      description: >
        This-week vs last-week totals for the Dashboard comparison card
        (GYM-136). Weeks are Monday-start calendar weeks in the requested
        timezone (UTC when omitted); a week with no training carries zeros.
      required: [this_week, last_week]
      properties:
        this_week:
          $ref: '#/components/schemas/WeekStats'
        last_week:
          $ref: '#/components/schemas/WeekStats'

    # ---- static data
    StaticData:
      type: object
      required: [sets, weights, reps]
      properties:
        sets:
          type: array
          items:
            type: string
        weights:
          type: array
          items:
            type: string
        reps:
          type: array
          items:
            type: string

security:
  - userJwt: []
