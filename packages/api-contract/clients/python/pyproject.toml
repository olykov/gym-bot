[project]
name = "gym-api-client"
version = "0.1.0"
description = "Async httpx client and pydantic models for the Gym Tracker Core API contract."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.6",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["gym_api_client*"]
