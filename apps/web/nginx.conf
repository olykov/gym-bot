server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets (incl. self-hosted fonts).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The HTML entry must NEVER be cached. A deploy ships new hashed asset
    # filenames referenced by index.html; Telegram's in-app webview caches the
    # HTML aggressively, so a stale index.html keeps pointing at the old JS and
    # the user sees a stale bundle for hours (recurring Mini App cache bug).
    # no-store forces a revalidate on every open so a fresh deploy is picked up
    # immediately. Hashed /assets and /fonts above stay immutable.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires -1;
    }

    # SPA fallback: serve index.html for all client-side routes. The internal
    # redirect re-enters `location = /index.html` above, so the no-store header
    # applies to every client-side route as well.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ to the Core API (admin_backend). Uses resolver + variable
    # upstream so Docker DNS is re-resolved per request (TTL valid=10s),
    # mirroring apps/admin/nginx.conf to avoid stale-IP 502s after restarts.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $admin_backend admin_backend;

        proxy_pass http://$admin_backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
