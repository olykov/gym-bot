server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ to admin_backend.
    # Uses resolver + variable upstream so Docker DNS is re-resolved per request
    # (TTL valid=10s). This avoids a stale-IP 502 after container restarts —
    # the same pattern used in infra/nginx/gymbot.olykov.com.conf.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $admin_backend admin_backend;

        proxy_pass http://$admin_backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
