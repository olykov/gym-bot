services:
  gymbot_redis:
    image: redis:7-alpine
    container_name: gymbot_redis
    hostname: gymbot_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - core-infra

  gymbot_db:
    image: postgres:16
    container_name: gymbot_db
    hostname: gymbot_db
    restart: always
    ports:
      - '9981:${DB_PORT}'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - core-infra

  gymbot_backend:
    image: "${BOT_IMAGE}:${BOT_TAG}"
    restart: always
    container_name: gymbot_backend
    hostname: gymbot_backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      WEB_APP_URL: ${WEB_APP_URL}
      REDIS_HOST: gymbot_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BOT_SERVICE_TOKEN: ${BOT_SERVICE_TOKEN}
      API_BASE_URL: ${API_BASE_URL:-http://admin_backend:8000/api/v1}
    ports:
      - "5400:5400"
    networks:
      - core-infra
    depends_on:
      gymbot_redis:
        condition: service_healthy
      gymbot_db:
        condition: service_started
      admin_backend:
        condition: service_started

  admin_backend:
    image: "${ADMIN_BACKEND_IMAGE}:${ADMIN_BACKEND_TAG}"
    restart: always
    container_name: admin_backend
    hostname: admin_backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: gymbot_db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BOT_SERVICE_TOKEN: ${BOT_SERVICE_TOKEN}
    ports:
      - "8001:8000"
    networks:
      - core-infra
    depends_on:
      - gymbot_db

  admin_frontend:
    image: "${ADMIN_FRONTEND_IMAGE}:${ADMIN_FRONTEND_TAG}"
    restart: always
    container_name: admin_frontend
    hostname: admin_frontend
    ports:
      - "5174:80"
    networks:
      - core-infra
    depends_on:
      - admin_backend

volumes:
  redis_data:

networks:
  core-infra:
    external: true
